info:
  name: Create new event
  type: http
  seq: 2

http:
  method: POST
  url: http://localhost:3000/api/v1/events
  body:
    type: json
    data: |-
      {
        "name": "secret",
        "dates": [
          "2027-01-01",
          "2028-01-01"
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
